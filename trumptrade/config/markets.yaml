# Production prediction-market venue manifest.
#
# Required metadata fields:
#   venue_class            : regulated_us | onchain_evm | onchain_solana |
#                            onchain_other | play_money | research
#   base_currency          : USD, USDC, USDH, BNB, ...
#   chain                  : polygon, base, bnb, ethereum, solana, null
#   auth_required_for_read : bool
#   auth_required_for_trade: bool
#   fee_estimate_per_dollar: 0.0 = no fee assumption
#   update_cadence         : real_time | minutes | hourly | daily
#   reliability            : 0-1
#   topics                 : list of policy categories the venue typically lists
#   supports_limit_orders  : bool
#   supports_websocket     : bool
#   description            : human-readable

venues:

  - name: polymarket
    factory: trumptrade.markets:PolymarketClient
    args: {}
    metadata:
      venue_class: onchain_evm
      base_currency: USDC
      chain: polygon
      auth_required_for_read: false
      auth_required_for_trade: true
      fee_estimate_per_dollar: 0.005
      update_cadence: real_time
      reliability: 0.95
      topics: [tariff_china, energy_oil_gas, crypto_friendly, defense_spending,
               bank_deregulation, pharma_price_pressure, immigration_border,
               big_tech_antitrust, clean_energy_rollback, macro, sports]
      supports_limit_orders: true
      supports_websocket: true
      description: "Polymarket — largest crypto prediction market (Polygon, USDC)"

  - name: predict.fun
    factory: trumptrade.markets:PredictFunClient
    args:
      testnet: false
    metadata:
      venue_class: onchain_evm
      base_currency: BNB
      chain: bnb
      auth_required_for_read: true     # mainnet needs API key
      auth_required_for_trade: true
      fee_estimate_per_dollar: 0.005
      update_cadence: real_time
      reliability: 0.85
      topics: [tariff_china, crypto_friendly, macro]
      supports_limit_orders: true
      supports_websocket: false
      description: "Predict.fun on BNB (mainnet 240 req/min, testnet free)"

  # Kept for read-only arb scanning even where the user can't open an
  # account. Trade routing skips Kalshi automatically when the second-pref
  # list runs (see cli.paper_run / trade_loop).
  - name: kalshi
    factory: trumptrade.markets:KalshiClient
    args: {}
    metadata:
      venue_class: regulated_us
      base_currency: USD
      chain: null
      auth_required_for_read: false
      auth_required_for_trade: true
      fee_estimate_per_dollar: 0.07
      update_cadence: real_time
      reliability: 1.00
      topics: [tariff_china, energy_oil_gas, crypto_friendly, defense_spending,
               bank_deregulation, pharma_price_pressure, immigration_border,
               big_tech_antitrust, clean_energy_rollback, macro]
      supports_limit_orders: true
      supports_websocket: true
      description: "Kalshi — CFTC-regulated US event exchange (read-only by default)"
