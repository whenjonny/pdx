follow_through_priors:
  # Historical probability that a Trump public statement translates to policy action
  # within N days. Used by the bull/bear debate and as a confidence haircut.
  tariff_threat_to_imposition_90d: 0.45
  executive_order_promise_to_signature_30d: 0.70
  tweet_only_no_official_channel_30d: 0.20
  signed_eo_to_full_enforcement_90d: 0.75
  walked_back_within_48h: 0.30  # ~30% of bold threats are softened within 2 days

risk_gates:
  min_confidence_to_alert: 0.55
  min_confidence_to_paper_trade: 0.70
  min_confidence_to_live_trade: 0.85
  max_basket_notional_pct: 0.10       # max 10% of account on one event
  max_single_ticker_notional_pct: 0.03
  mandatory_stop_loss_pct: 0.08       # 8% stop on any Trump-driven position
  walk_back_hard_stop: true           # flatten if Trump reverses within 48h
