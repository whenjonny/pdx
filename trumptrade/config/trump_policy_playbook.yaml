    hawkish_long:
      - {ticker: COIN, weight: 0.9,  thesis: "Primary US exchange"}
      - {ticker: MSTR, weight: 0.9,  thesis: "Leveraged BTC proxy"}
      - {ticker: HOOD, weight: 0.7,  thesis: "Retail crypto flow"}
      - {ticker: IBIT, weight: 0.85, thesis: "Spot BTC ETF"}
      - {ticker: MARA, weight: 0.75, thesis: "BTC miner"}
      - {ticker: RIOT, weight: 0.7,  thesis: "BTC miner"}
