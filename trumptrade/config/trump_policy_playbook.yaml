    keywords: ["drill", "drilling", "pipeline", "keystone", "lng", "anwr", "offshore lease", "offshore leases", "epa rollback", "energy dominance", "oil", "gas"]
    hawkish_long:  # Pro oil/gas announcement
      - {ticker: XOM, weight: 0.85, thesis: "Integrated oil major"}
      - {ticker: CVX, weight: 0.85, thesis: "Integrated oil major"}
      - {ticker: OXY, weight: 0.9,  thesis: "Permian pure-play, higher beta"}
      - {ticker: COP, weight: 0.8,  thesis: "E&P"}
      - {ticker: SLB, weight: 0.75, thesis: "Oilfield services"}
      - {ticker: HAL, weight: 0.7,  thesis: "OFS"}
      - {ticker: XLE, weight: 0.8,  thesis: "Sector ETF"}
    hawkish_short:
      - {ticker: ENPH, weight: 0.7, thesis: "Residential solar, inversely correlated"}
      - {ticker: SEDG, weight: 0.75, thesis: "Solar inverters"}
      - {ticker: ICLN, weight: 0.6, thesis: "Clean energy ETF"}
      - {ticker: NEE,  weight: 0.4, thesis: "Renewables utility"}

