version: 1
last_updated: 2026-04-22
notes: |
  Trump trading playbook. Maps policy categories to ticker baskets (longs/shorts).
  Used as:
    1. Prompt context for the policy_classifier (tells the LLM what categories exist).
    2. Deterministic lookup: category + sentiment -> basket (no LLM call needed).

  Tickers are examples, not recommendations. Weights are 0-1 (conviction).
  Sources for mapping rationale: historical 2017-2020 Trump 1 market reactions,
  published sell-side "Trump trade" baskets (GS/MS/JPM 2024-2026 notes).

categories:

  tariff_china:
    description: "Tariffs, sanctions, or trade restrictions targeting China (including sector-specific: EV, semis, solar, pharma)"
    keywords: ["china", "chinese", "tariff", "section 301", "cfius", "entity list", "de minimis", "ccp", "beijing", "xi"]
    hawkish_long:  # Trump announces new/higher tariff
      - {ticker: NUE,  weight: 0.9, thesis: "US steel beneficiary"}
      - {ticker: STLD, weight: 0.85, thesis: "US steel"}
      - {ticker: CLF,  weight: 0.7,  thesis: "US steel, higher beta"}
      - {ticker: X,    weight: 0.7,  thesis: "US steel"}
      - {ticker: CAT,  weight: 0.6,  thesis: "US domestic capex"}
      - {ticker: DE,   weight: 0.5,  thesis: "US ag machinery"}
    hawkish_short:
      - {ticker: KWEB, weight: 0.9,  thesis: "China internet ETF"}
      - {ticker: FXI,  weight: 0.85, thesis: "China large cap ETF"}
      - {ticker: MCHI, weight: 0.7,  thesis: "China broad ETF"}
      - {ticker: AAPL, weight: 0.6,  thesis: "Heavy China supply chain"}
      - {ticker: TSLA, weight: 0.5,  thesis: "Shanghai factory exposure"}
    dovish_long:   # De-escalation / tariff rollback
      - {ticker: KWEB, weight: 0.8, thesis: "Unwind China discount"}
      - {ticker: AAPL, weight: 0.5, thesis: "Supply chain relief"}

  energy_oil_gas:
